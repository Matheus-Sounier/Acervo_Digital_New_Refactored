version: '3.8'
services:

  oracle:
      image: container-registry.oracle.com/database/free:latest
      container_name: ${ORACLE_CONTAINER_NAME}
      restart: unless-stopped
      environment: 
        RACLE_PWD: ${DB_PASSWORD}
        ORACLE_CHARACTERSET: AL32UTF8
      ports:
        - ${ORACLE_CONTAINER_PORTS}:1521
      volumes:
        - oracle_data:/opt/oracle/oradata

      networks:
        - ${NETWORK}

      healthcheck:
        test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s ${DB_USER}/${DB_PASSWORD}@${DB_HOST}:1521/${DB_SERVICE_NAME}"]
        interval: 30s
        timeout: 10s
        retries: 10
        start_period: 120s

  backend:
    build:
      context: ./backend
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - .env

    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      oracle:
        condition: service_healthy

    networks:
      - ${NETWORK}
    
  frontend:
    image: nginx:alpine
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend 
    networks:
      - ${NETWORK}

networks:
  ${NETWORK}:
    driver: bridge

volumes:
  oracle_data:  
   